<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Jarvis Admin - Users</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #00ffea;
      min-height: 100dvh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 36px;
      text-shadow: 0 0 10px #00ffea;
      color: #00ffea;
    }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(0, 255, 234, 0.1);
      border: 1px solid rgba(0, 255, 234, 0.3);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      min-width: 150px;
    }
    
    .stat-card h3 {
      font-size: 32px;
      color: #00ffea;
      margin-bottom: 5px;
    }
    
    .stat-card p {
      color: rgba(0, 255, 234, 0.7);
      font-size: 14px;
    }
    
    .refresh-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 12px 24px;
      background: #00ffea;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .refresh-btn:hover {
      background: #00ccbb;
      box-shadow: 0 0 15px rgba(0, 255, 234, 0.5);
    }
    
    .users-table {
      width: 100%;
      background: rgba(8, 11, 16, 0.8);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0, 255, 234, 0.3);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    thead {
      background: rgba(0, 255, 234, 0.2);
    }
    
    th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #00ffea;
      border-bottom: 2px solid rgba(0, 255, 234, 0.3);
    }
    
    td {
      padding: 15px;
      border-bottom: 1px solid rgba(0, 255, 234, 0.1);
      color: rgba(0, 255, 234, 0.9);
    }
    
    tr:hover {
      background: rgba(0, 255, 234, 0.05);
    }
    
    .no-users {
      text-align: center;
      padding: 40px;
      color: rgba(0, 255, 234, 0.5);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #00ffea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Jarvis Admin Panel</h1>
    
    <div class="stats">
      <div class="stat-card">
        <h3 id="totalUsers">0</h3>
        <p>Total Users</p>
      </div>
    </div>
    
    <button class="refresh-btn" onclick="loadUsers()">🔄 Refresh</button>
    
    <div class="users-table">
      <div id="loading" class="loading">Loading users...</div>
      <div id="usersContainer" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>Phone Number</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Created At</th>
              <th>Last Login</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
          </tbody>
        </table>
      </div>
      <div id="noUsers" class="no-users" style="display: none;">
        No users found in the database.
      </div>
    </div>
  </div>

  <script>
    async function loadUsers() {
      const loading = document.getElementById("loading");
      const usersContainer = document.getElementById("usersContainer");
      const noUsers = document.getElementById("noUsers");
      const usersTableBody = document.getElementById("usersTableBody");
      
      loading.style.display = "block";
      usersContainer.style.display = "none";
      noUsers.style.display = "none";
      
      try {
        const response = await fetch("http://localhost:3001/admin/users");
        const data = await response.json();
        
        document.getElementById("totalUsers").textContent = data.total || 0;
        
        if (data.users && data.users.length > 0) {
          usersTableBody.innerHTML = "";
          
          data.users.forEach(user => {
            const row = document.createElement("tr");
            
            const phoneCell = document.createElement("td");
            phoneCell.textContent = user.phoneNumber || "N/A";
            phoneCell.style.fontFamily = "monospace";
            phoneCell.style.fontSize = "14px";
            
            const firstNameCell = document.createElement("td");
            firstNameCell.textContent = user.firstName || "N/A";
            
            const lastNameCell = document.createElement("td");
            lastNameCell.textContent = user.lastName || "N/A";
            
            const createdAtCell = document.createElement("td");
            createdAtCell.textContent = user.createdAt 
              ? new Date(user.createdAt).toLocaleString() 
              : "N/A";
            
            const lastLoginCell = document.createElement("td");
            lastLoginCell.textContent = user.lastLogin 
              ? new Date(user.lastLogin).toLocaleString() 
              : "N/A";
            
            row.appendChild(phoneCell);
            row.appendChild(firstNameCell);
            row.appendChild(lastNameCell);
            row.appendChild(createdAtCell);
            row.appendChild(lastLoginCell);
            
            usersTableBody.appendChild(row);
          });
          
          loading.style.display = "none";
          usersContainer.style.display = "block";
        } else {
          loading.style.display = "none";
          noUsers.style.display = "block";
        }
      } catch (error) {
        console.error("Error loading users:", error);
        loading.textContent = "Error loading users. Make sure the server is running.";
        loading.style.color = "#ff4444";
      }
    }
    
    // Load users on page load
    loadUsers();
    
    // Auto-refresh every 30 seconds
    setInterval(loadUsers, 30000);
  </script>
</body>
</html>
